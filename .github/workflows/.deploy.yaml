name: Build & Deploy Book Priest with Docker to Vercel

on:
  push:
    branches:
      - main

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t book-priest-builder .

      - name: Prepare output directory on host (helps permissions)
        run: mkdir -p .vercel/output

      - name: Run Build inside Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            --user $(id -u):$(id -g) \
            book-priest-builder

      - name: Debug – Show .vercel/output on host
        run: |
          pwd
          ls -la .vercel || echo ".vercel missing!"
          ls -la .vercel/output || echo "output folder missing!"
          find .vercel/output -type f | head -n 30 || true
          du -sh .vercel/output 2>/dev/null || echo "Size 0 or missing"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy Prebuilt to Vercel (Production)
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        # Runs from repo root → finds .vercel/output automatically