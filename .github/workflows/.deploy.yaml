name: Build & Deploy Book Priest with Docker

on:
  push:
    branches:
      - main

env:
  VERCEL_ORG_ID:    ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_TOKEN:     ${{ secrets.VERCEL_TOKEN }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t book-priest-builder .

      - name: Run Build inside Docker (creates .vercel/output at root)
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            book-priest-builder

      - name: Verify .vercel/output exists
        run: ls -la .vercel/output || echo "Folder missing – build failed!"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy Prebuilt to Vercel (Production)
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        # ^ runs from repo root → sees .vercel/output correctly