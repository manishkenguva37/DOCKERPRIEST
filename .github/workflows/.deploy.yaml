name: Build & Deploy Book Priest

on:
  push:
    branches:
      - main

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2️⃣ Build Docker image
      - name: Build Docker Image
        run: docker build -t book-priest .

      # 3️⃣ Run Docker container with volume mapping so .vercel/output exists on host
      - name: Build project inside Docker
        run: docker run --rm -v ${{ github.workspace }}/book_priest:/app/book_priest book-priest

      # 4️⃣ Install Vercel CLI
      - name: Install Vercel CLI
        run: npm install -g vercel

      # 5️⃣ Deploy prebuilt
      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
        working-directory: ./book_priest