name: Build & Deploy Book Priest

on:
  push:
    branches:
      - main

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2️⃣ Build Docker image from repo root
      - name: Build Docker Image
        run: docker build -t book-priest .

      # 3️⃣ Install Vercel CLI globally
      - name: Install Vercel CLI
        run: npm install -g vercel

      # 4️⃣ Pull Vercel project settings (from book_priest folder if project files are there)
      - name: Pull Vercel Project Settings
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN
        working-directory: ./book_priest

      # 5️⃣ Deploy to Vercel using the prebuilt Docker image
      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
        working-directory: ./book_priest