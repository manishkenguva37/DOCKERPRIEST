name: Build & Deploy Book Priest with Docker to Vercel

on:
  push:
    branches:
      - main

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t book-priest-builder .

      - name: Create container to extract artifacts from
        run: docker create --name temp-builder book-priest-builder

      - name: Extract dist/ from container to host
        run: |
          # Vercel prebuilt format requires:
          #   .vercel/output/config.json  (version: 3)
          #   .vercel/output/static/      (your static files)
          mkdir -p .vercel/output/static
          echo '{"version":3}' > .vercel/output/config.json
          docker cp temp-builder:/app/book_priest/dist/. .vercel/output/static/
          ls -la .vercel/output/static || echo "Copy failed – nothing in output!"

      - name: Cleanup temporary container
        if: always()
        run: docker rm -f temp-builder

      - name: Debug output contents
        run: |
          pwd
          ls -la .vercel/output
          find .vercel/output -type f | head -n 20
          du -sh .vercel/output || echo "Empty!"

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy Prebuilt to Vercel (Production)
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}